<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Synthesis Scheduler</title>
<style>
  :root {
    --bg: #f4f6fa; --card: #ffffff; --line: #e3e8f0; --text: #1c2333; --sub: #6b7690;
    --accent: #3b5bdb; --accent-soft: #e7ecfd; --green: #2f9e63; --green-soft: #e3f5ec;
    --amber: #b7791f; --amber-soft: #fdf3e0; --red: #d64550; --red-soft: #fdeaec;
    --violet: #7048b6; --violet-soft: #f0e9fb; --radius: 12px;
    --shadow: 0 1px 3px rgba(20,30,60,.08), 0 4px 14px rgba(20,30,60,.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
         background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.55; }
  button { font-family: inherit; cursor: pointer; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 16px 14px 80px; }

  /* ---- header ---- */
  header { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }
  .logo small { display:block; font-size: 12px; font-weight: 500; color: var(--sub); }
  .head-right { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .userchip { background: var(--card); border: 1px solid var(--line); border-radius: 999px;
              padding: 6px 14px; font-weight: 600; font-size: 14px; box-shadow: var(--shadow);
              display: inline-flex; gap: 8px; align-items: center; }
  .userchip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .btn { border: 1px solid var(--line); background: var(--card); color: var(--text);
         border-radius: 10px; padding: 8px 14px; font-size: 14px; font-weight: 600;
         transition: .15s; box-shadow: var(--shadow); }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { filter: brightness(1.08); color:#fff; }
  .btn.danger { color: var(--red); }
  .btn.danger:hover { border-color: var(--red); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn.sm { padding: 4px 10px; font-size: 12.5px; border-radius: 8px; box-shadow: none; }

  /* ---- phase banner ---- */
  .phasebar { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
              box-shadow: var(--shadow); padding: 14px 18px; margin-bottom: 14px; }
  .phasebar .toprow { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; }
  .badge { display: inline-block; padding: 3px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 700; }
  .b-accent { background: var(--accent-soft); color: var(--accent); }
  .b-green  { background: var(--green-soft);  color: var(--green); }
  .b-amber  { background: var(--amber-soft);  color: var(--amber); }
  .b-red    { background: var(--red-soft);    color: var(--red); }
  .b-violet { background: var(--violet-soft); color: var(--violet); }
  .b-gray   { background: #eef1f6; color: var(--sub); }
  .countdown { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--accent); }
  .steps { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
  .step { flex: 1 1 140px; border-radius: 9px; padding: 8px 10px; border: 1px solid var(--line);
          font-size: 12.5px; color: var(--sub); background: #fafbfe; }
  .step b { display: block; font-size: 13px; color: var(--text); }
  .step.on { border-color: var(--accent); background: var(--accent-soft); }
  .step.on b { color: var(--accent); }
  .step.done { opacity: .55; }

  /* ---- tabs ---- */
  nav.tabs { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; }
  nav.tabs button { white-space: nowrap; border: none; background: transparent; padding: 9px 15px;
                    border-radius: 10px; font-size: 14.5px; font-weight: 600; color: var(--sub); }
  nav.tabs button.on { background: var(--text); color: #fff; }
  nav.tabs button:not(.on):hover { background: #e8ecf4; color: var(--text); }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
          box-shadow: var(--shadow); padding: 18px; margin-bottom: 14px; }
  .card h2 { font-size: 16.5px; margin-bottom: 10px; letter-spacing: -.2px; }
  .card h3 { font-size: 14.5px; margin: 14px 0 6px; }
  .muted { color: var(--sub); font-size: 13px; }
  .note { background: #fafbfe; border: 1px dashed var(--line); border-radius: 9px;
          padding: 10px 12px; font-size: 13px; color: var(--sub); margin: 8px 0; }

  /* ---- schedule grid ---- */
  .gridwrap { overflow-x: auto; }
  table.sched { border-collapse: separate; border-spacing: 4px; width: 100%; min-width: 640px; }
  table.sched th { font-size: 12px; color: var(--sub); font-weight: 600; padding: 4px 6px; text-align: center; }
  table.sched th.rowh { text-align: left; min-width: 130px; }
  table.sched td.rowh { font-size: 12.5px; font-weight: 600; padding: 4px 8px; white-space: nowrap; }
  table.sched td.rowh small { display: block; color: var(--sub); font-weight: 500; font-size: 11px; }
  .cell { height: 46px; min-width: 92px; border-radius: 9px; border: 1.5px solid var(--line);
          background: #fbfcfe; text-align: center; vertical-align: middle; font-size: 12.5px;
          padding: 2px 4px; position: relative; transition: .12s; }
  .cell.clickable { cursor: pointer; }
  .cell.clickable:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cell.mine    { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .cell.lottery { background: var(--accent-soft); border-color: #b9c6f5; color: #2c47b8; font-weight: 700; }
  .cell.booked  { background: var(--green-soft); border-color: #bfe6d2; color: #1c7a49; font-weight: 700; }
  .cell.minewin { outline: 2px solid var(--accent); }
  .cell.empty-book { border-style: dashed; color: var(--sub); }
  .cell.disabled { opacity: .5; }
  .cell .cnt { position: absolute; top: -7px; right: -5px; background: var(--amber); color: #fff;
               border-radius: 999px; font-size: 10.5px; font-weight: 700; padding: 1px 6px; }
  .cell .tag { display:block; font-size: 10.5px; font-weight: 500; opacity: .75; }
  .periodrow td { padding-top: 10px; font-size: 12px; font-weight: 800; color: var(--sub);
                  text-transform: uppercase; letter-spacing: .6px; }

  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; font-size: 12px; color: var(--sub); }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .sw { width: 13px; height: 13px; border-radius: 4px; border: 1.5px solid var(--line); display: inline-block; }

  /* ---- token chips ---- */
  .tokens { display: flex; gap: 6px; align-items: center; }
  .tok { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--accent);
         display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--accent); }
  .tok.used { border-color: var(--line); color: #c3cad8; background: #f2f4f9; }

  /* ---- lists / tables ---- */
  table.list { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.list th { text-align: left; color: var(--sub); font-size: 12px; font-weight: 600;
                  border-bottom: 1px solid var(--line); padding: 6px 8px; }
  table.list td { border-bottom: 1px solid #f0f2f7; padding: 8px; }
  table.list tr:last-child td { border-bottom: none; }

  /* ---- rules tab ---- */
  .rules h3 { margin: 18px 0 8px; font-size: 15px; color: var(--accent); }
  .rules ul { margin: 4px 0 10px 20px; }
  .rules li { margin: 4px 0; font-size: 13.8px; }
  .rules li li { font-size: 13.2px; color: #3a4358; }

  /* ---- modal ---- */
  .modal-bg { position: fixed; inset: 0; background: rgba(15,22,40,.45); display: flex;
              align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 400px;
           box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal h2 { font-size: 17px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--sub); margin-bottom: 4px; }
  .field input, .field select { width: 100%; border: 1.5px solid var(--line); border-radius: 9px;
                                padding: 9px 12px; font-size: 15px; font-family: inherit; background: #fff; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }

  /* ---- toast ---- */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 99;
           display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toastmsg { background: #1c2333; color: #fff; border-radius: 10px; padding: 10px 18px;
              font-size: 13.5px; box-shadow: 0 8px 30px rgba(0,0,0,.3); animation: pop .2s; max-width: 90vw; }
  .toastmsg.err { background: var(--red); }
  .toastmsg.okk { background: var(--green); }
  @keyframes pop { from { opacity: 0; transform: translateY(8px);} }

  .demo-banner { background: var(--amber-soft); border: 1px solid #f0dcb4; color: var(--amber);
                 border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
  .verify-ok { color: var(--green); font-weight: 700; }
  .verify-bad { color: var(--red); font-weight: 700; }
  .prio-banner { background: var(--violet-soft); border: 1px solid #ddd0f2; color: var(--violet);
                 border-radius: 10px; padding: 10px 14px; font-size: 13.5px; margin-bottom: 12px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } }
  .stat { text-align: center; padding: 10px; border: 1px solid var(--line); border-radius: 10px; background:#fafbfe; }
  .stat b { display: block; font-size: 22px; color: var(--accent); }
  .stat span { font-size: 12px; color: var(--sub); }
  .flexrow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  code.k { background:#eef1f6; border-radius:5px; padding:1px 6px; font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Weekly Synthesis Scheduler<small id="weekLabel"></small></div>
    <div class="head-right" id="headRight"></div>
  </header>
  <div id="demoBanner"></div>
  <div class="phasebar" id="phasebar"></div>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
</div>
<div id="modalRoot"></div>
<div id="toast"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>

<script>
/* ★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★★

<script>
/* =====================================================================
 * Weekly Synthesis Scheduler - 핵심 공유 로직 (주차 계산 + 결정론적 추첨)
 * 이 파일은 index.html 에 그대로 인라인되며, Node 단위테스트에서도 사용됨
 * ===================================================================== */

const KST_OFFSET_MS = 9 * 3600 * 1000; // Asia/Seoul, DST 없음
const DAY_MS = 86400000;

/* ---- 슬롯 정의 (canonical order) ----
 * Day   : 월~목 06:00-18:00  → D0~D3
 * Night : 월~목 18:00-익일06 → N0~N3
 * Weekend: 금/토/일 전일     → W0~W2
 * 배치: 1~4  → cellKey = "D0-1" 형태 (총 44개)
 */
const SLOT_DEFS = [
  { key: 'D0', period: 'Day',     label: '월요일 06-18시',        day: '월' },
  { key: 'D1', period: 'Day',     label: '화요일 06-18시',        day: '화' },
  { key: 'D2', period: 'Day',     label: '수요일 06-18시',        day: '수' },
  { key: 'D3', period: 'Day',     label: '목요일 06-18시',        day: '목' },
  { key: 'N0', period: 'Night',   label: '월요일 18시-화 06시',   day: '월' },
  { key: 'N1', period: 'Night',   label: '화요일 18시-수 06시',   day: '화' },
  { key: 'N2', period: 'Night',   label: '수요일 18시-목 06시',   day: '수' },
  { key: 'N3', period: 'Night',   label: '목요일 18시-금 06시',   day: '목' },
  { key: 'W0', period: 'Weekend', label: '금요일 (전일)',          day: '금' },
  { key: 'W1', period: 'Weekend', label: '토요일 (전일)',          day: '토' },
  { key: 'W2', period: 'Weekend', label: '일요일 (전일)',          day: '일' },
];
const SLOT_ORDER = SLOT_DEFS.map(s => s.key);
const BATCHES = [1, 2, 3, 4];
const ALL_CELL_KEYS = SLOT_ORDER.flatMap(s => BATCHES.map(b => `${s}-${b}`));
const TOKENS_PER_WEEK = 4;
const DAY_CAP = 2; // 1주 Day 시간대 1인 최대 배치 수

function isDaySlot(slotKey) { return slotKey[0] === 'D'; }
function parseCell(cellKey) {
  const [slot, b] = cellKey.split('-');
  return { slot, batch: parseInt(b, 10) };
}

/* ---- 주차 계산 (월요일 시작, KST 고정) ---- */
function kstDayNum(ms) { return Math.floor((ms + KST_OFFSET_MS) / DAY_MS); }
function kstDow(ms) { return (kstDayNum(ms) + 3) % 7; } // 0=월 ... 6=일 (1970-01-01=목 검증됨)
// 주 인덱스(월요일 시작). 월요일의 dayNum ≡ 4 (mod 7) 이므로 +3 보정 후 7로 나눠 항상 '정수' 반환
function weekIndexOf(ms) { return Math.floor((kstDayNum(ms) + 3) / 7); }
function weekStartMs(weekIdx) { return (weekIdx * 7 - 3) * DAY_MS - KST_OFFSET_MS; } // 해당 주 월요일 00:00 KST의 UTC ms
function fmtDate(ms) {
  const d = new Date(ms + KST_OFFSET_MS);
  return `${d.getUTCMonth() + 1}/${d.getUTCDate()}`;
}
function weekLabel(weekIdx) {
  const s = weekStartMs(weekIdx);
  return `${fmtDate(s)}(월) ~ ${fmtDate(s + 6 * DAY_MS)}(일)`;
}
/* 투표 주(현재 주)의 국면 판정. targetWeek = votingWeek + 1 */
function phaseOf(nowMs) {
  const votingWeek = weekIndexOf(nowMs);
  const targetWeek = votingWeek + 1;
  const monday = weekStartMs(votingWeek);
  const voteClose = monday + 3 * DAY_MS;            // 목요일 00:00 (= 수요일 24시)
  const announce = monday + 3 * DAY_MS + 12 * 3600 * 1000; // 목요일 12:00
  let phase;
  if (nowMs < voteClose) phase = 'VOTING';
  else if (nowMs < announce) phase = 'WAITING';
  else phase = 'BOOKING';
  return { votingWeek, targetWeek, monday, voteClose, announce, phase };
}

/* ---- 결정론적 시드 및 PRNG ---- */
/* 투표 스냅샷의 canonical JSON: memberId 정렬, 각 멤버의 cell 목록 정렬 */
function canonicalVotesJson(votesByMember) {
  const ids = Object.keys(votesByMember).sort();
  const obj = {};
  for (const id of ids) {
    obj[id] = [...votesByMember[id]].sort();
  }
  return JSON.stringify(obj);
}

/* SHA-256 (의존성 없는 순수 JS 구현; 브라우저/Node 동일 결과) */
function sha256Hex(str) {
  const K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
    0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
    0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
    0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
    0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
    0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
    0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
    0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const rr = (x, n) => (x >>> n) | (x << (32 - n));
  // UTF-8 인코딩
  const bytes = [];
  for (let i = 0; i < str.length; i++) {
    let c = str.codePointAt(i);
    if (c > 0xffff) i++;
    if (c < 0x80) bytes.push(c);
    else if (c < 0x800) bytes.push(0xc0 | (c >> 6), 0x80 | (c & 63));
    else if (c < 0x10000) bytes.push(0xe0 | (c >> 12), 0x80 | ((c >> 6) & 63), 0x80 | (c & 63));
    else bytes.push(0xf0 | (c >> 18), 0x80 | ((c >> 12) & 63), 0x80 | ((c >> 6) & 63), 0x80 | (c & 63));
  }
  const bitLen = bytes.length * 8;
  bytes.push(0x80);
  while (bytes.length % 64 !== 56) bytes.push(0);
  for (let i = 7; i >= 0; i--) bytes.push((i >= 4 ? 0 : (bitLen / Math.pow(2, i * 8))) & 0xff);
  // 상위 32비트는 실용상 0 (2^32비트 미만 입력)
  for (let off = 0; off < bytes.length; off += 64) {
    const w = new Array(64);
    for (let i = 0; i < 16; i++)
      w[i] = (bytes[off + 4 * i] << 24) | (bytes[off + 4 * i + 1] << 16) | (bytes[off + 4 * i + 2] << 8) | bytes[off + 4 * i + 3];
    for (let i = 16; i < 64; i++) {
      const s0 = rr(w[i - 15], 7) ^ rr(w[i - 15], 18) ^ (w[i - 15] >>> 3);
      const s1 = rr(w[i - 2], 17) ^ rr(w[i - 2], 19) ^ (w[i - 2] >>> 10);
      w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
    }
    let [a, b, c, d, e, f, g, h] = H;
    for (let i = 0; i < 64; i++) {
      const S1 = rr(e, 6) ^ rr(e, 11) ^ rr(e, 25);
      const ch = (e & f) ^ (~e & g);
      const t1 = (h + S1 + ch + K[i] + w[i]) | 0;
      const S0 = rr(a, 2) ^ rr(a, 13) ^ rr(a, 22);
      const mj = (a & b) ^ (a & c) ^ (b & c);
      const t2 = (S0 + mj) | 0;
      h = g; g = f; f = e; e = (d + t1) | 0; d = c; c = b; b = a; a = (t1 + t2) | 0;
    }
    H = H.map((x, i) => (x + [a, b, c, d, e, f, g, h][i]) | 0);
  }
  return H.map(x => (x >>> 0).toString(16).padStart(8, '0')).join('');
}

/* mulberry32 - 시드 기반 결정론적 PRNG */
function makeRng(seedHex) {
  let s = parseInt(seedHex.slice(0, 8), 16) >>> 0;
  // 시드 확장: 해시 뒷부분도 섞음
  s = (s ^ parseInt(seedHex.slice(8, 16), 16)) >>> 0;
  return function () {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffled(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* =====================================================================
 * 결정론적 추첨
 * 입력: votesByMember = { memberId: ["D0-1","D0-2","N1-3", ...] }
 * 출력: { seed, assignments: {cellKey: memberId}, priorityMembers: [...],
 *         dayCount: {memberId: n} }
 *
 * 규칙 구현:
 * (1) 동일 슬롯+배치 1인 배정, 경합 시 시드 기반 무작위 추첨
 * (2) Day 시간대 주간 1인 최대 2배치 (배정 시점 강제)
 * (3) 동일 슬롯에 2개 이상 배치 투표자(번들)가 우선권, 번들 간 경합도 무작위
 * (4) 번들은 all-or-nothing (전부 배정 또는 전부 탈락)
 * ===================================================================== */
function computeLottery(votesByMember) {
  const canonical = canonicalVotesJson(votesByMember);
  const seed = sha256Hex(canonical);
  const rng = makeRng(seed);

  const assignments = {}; // cellKey -> memberId
  const dayCount = {};    // memberId -> Day 배정 수
  const memberIds = Object.keys(votesByMember).sort();

  for (const slot of SLOT_ORDER) {
    const day = isDaySlot(slot);
    // 이 슬롯에서 멤버별 투표 배치 목록
    const bySlot = [];
    for (const m of memberIds) {
      const bs = (votesByMember[m] || [])
        .map(parseCell).filter(c => c.slot === slot).map(c => c.batch)
        .sort((a, b) => a - b);
      if (bs.length) bySlot.push({ m, bs });
    }
    // --- 1단계: 번들(같은 슬롯 2개 이상 배치) 우선, 무작위 순서 그리디 ---
    const bundles = shuffled(bySlot.filter(x => x.bs.length >= 2), rng);
    for (const { m, bs } of bundles) {
      if (day && (dayCount[m] || 0) + bs.length > DAY_CAP) continue; // 규칙(2)
      const free = bs.every(b => !assignments[`${slot}-${b}`]);
      if (free) { // 규칙(4): all-or-nothing
        for (const b of bs) assignments[`${slot}-${b}`] = m;
        if (day) dayCount[m] = (dayCount[m] || 0) + bs.length;
      }
    }
    // --- 2단계: 단일 투표자, 배치별 무작위 추첨 ---
    const singles = bySlot.filter(x => x.bs.length === 1);
    for (const b of BATCHES) {
      const key = `${slot}-${b}`;
      if (assignments[key]) continue;
      const cands = singles
        .filter(x => x.bs[0] === b)
        .filter(x => !(day && (dayCount[x.m] || 0) >= DAY_CAP))
        .map(x => x.m); // memberIds 순회로 이미 정렬됨
      if (!cands.length) continue;
      const pick = cands.length === 1 ? cands[0] : cands[Math.floor(rng() * cands.length)];
      assignments[key] = pick;
      if (day) dayCount[pick] = (dayCount[pick] || 0) + 1;
    }
  }

  // Day에 1표 이상 투자했으나 Day 배정 0인 인원 → 우선예약 대상
  const priorityMembers = memberIds.filter(m => {
    const votedDay = (votesByMember[m] || []).some(c => isDaySlot(parseCell(c).slot));
    return votedDay && !(dayCount[m] > 0);
  });

  return { seed, assignments, priorityMembers, dayCount, canonical };
}

/* 투표 유효성 검사 (클라이언트 측; 서버 rules 와 동일 기준) */
function validateVoteSet(cells) {
  if (!Array.isArray(cells)) return '형식 오류';
  if (cells.length > TOKENS_PER_WEEK) return `토큰은 주당 ${TOKENS_PER_WEEK}개까지입니다.`;
  const set = new Set(cells);
  if (set.size !== cells.length) return '동일 슬롯·배치에 중복 투표할 수 없습니다.';
  for (const c of cells) if (!ALL_CELL_KEYS.includes(c)) return `유효하지 않은 슬롯: ${c}`;
  // 단일 Day 슬롯 내 3개 이상 번들은 규칙(2)와 (4)의 조합상 절대 당첨 불가 → 사전 차단
  for (const s of SLOT_ORDER.filter(isDaySlot)) {
    const n = cells.filter(c => parseCell(c).slot === s).length;
    if (n > DAY_CAP) return `Day 슬롯(${s}) 하나에 ${n}개 배치 묶음은 Day 주간 2개 제한과 전부-또는-전무 규칙상 당첨이 불가능하여 차단됩니다.`;
  }
  return null;
}

/* Node 테스트용 export (브라우저에서는 무시됨) */
if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    SLOT_DEFS, SLOT_ORDER, BATCHES, ALL_CELL_KEYS, TOKENS_PER_WEEK, DAY_CAP,
    isDaySlot, parseCell, kstDayNum, kstDow, weekIndexOf, weekStartMs, weekLabel, phaseOf,
    canonicalVotesJson, sha256Hex, makeRng, shuffled, computeLottery, validateVoteSet, fmtDate,
  };
}

<script>
/* =====================================================================
 * Weekly Synthesis Scheduler - 애플리케이션
 * ===================================================================== */
'use strict';

const IS_DEMO = !FIREBASE_CONFIG.apiKey;

/* ---------------- 전역 상태 ---------------- */
const S = {
  tab: 'dash',
  demoOffset: 0,
  uid: null,
  user: null,            // {id, name, isAdmin}
  members: {},           // id -> {id, name, pinHash, uids, isAdmin, active}
  config: { priorityWindowMin: 60, bookingDayCapEnabled: false },
  votes: {},             // targetWeek: memberId -> [cells]
  results: null,         // targetWeek results doc
  bookings: {},          // targetWeek: cellKey -> {memberId}
  curResults: null,      // 이번 주(진행중인 주) 결과
  curBookings: {},
  pendingCells: null,    // 투표 탭 편집 중 선택
  verify: null,          // {ok, msg}
  histCache: {},         // week -> {votes, results, bookings, verify}
  connected: false,
  authError: null,
  ensuring: false,
};

const now = () => Date.now() + S.demoOffset;
const $ = sel => document.querySelector(sel);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const memberName = id => S.members[id]?.name || `(삭제된 멤버:${String(id).slice(0,5)})`;
const pinHashOf = (memberId, pin) => sha256Hex(memberId + '|' + pin);

function toast(msg, cls = '') {
  const el = document.createElement('div');
  el.className = 'toastmsg ' + cls;
  el.textContent = msg;
  $('#toast').appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

/* ---------------- 시간/국면 헬퍼 ---------------- */
function cycle() { return phaseOf(now()); }
function fmtDT(ms) {
  const d = new Date(ms + KST_OFFSET_MS);
  const wd = '월화수목금토일'[(kstDayNum(ms) + 3) % 7];
  return `${d.getUTCMonth() + 1}/${d.getUTCDate()}(${wd}) ${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}
function fmtDur(ms) {
  if (ms < 0) ms = 0;
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600), m = Math.floor(s % 3600 / 60), ss = s % 60;
  return (d ? d + '일 ' : '') + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function priorityWindowEnd(c) { return c.announce + (S.config.priorityWindowMin || 0) * 60000; }
function inPriorityWindow(c) {
  return S.results && S.results.priorityMembers?.length > 0 && now() >= c.announce && now() < priorityWindowEnd(c);
}

/* =====================================================================
 * 데이터 저장소: Firestore / Demo 공통 인터페이스
 * ===================================================================== */
let store;

/* ---------------- Firestore store ---------------- */
function makeFirestoreStore() {
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();
  const auth = firebase.auth();
  const FV = firebase.firestore.FieldValue;
  let unsubs = [];
  let listenWeeks = null;

  async function start() {
    try { await auth.signInAnonymously(); }
    catch (e) { S.authError = 'Firebase 인증 실패: ' + e.message + ' (콘솔에서 익명 로그인 활성화 필요)'; render(); return; }
    auth.onAuthStateChanged(u => {
      if (!u) return;
      S.uid = u.uid;
      resubscribe();
    });
  }

  function resubscribe() {
    const c = cycle();
    listenWeeks = c.targetWeek;
    unsubs.forEach(f => f()); unsubs = [];
    const on = (q, cb) => unsubs.push(q.onSnapshot(cb, e => { console.error(e); toast('데이터 수신 오류: ' + e.message, 'err'); }));

    on(db.collection('members'), snap => {
      S.members = {};
      snap.forEach(d => S.members[d.id] = { id: d.id, ...d.data() });
      restoreSession();
      S.connected = true; render();
    });
    on(db.doc('config/app'), d => {
      if (d.exists) S.config = { priorityWindowMin: 60, bookingDayCapEnabled: false, ...d.data() };
      render();
    });
    on(db.collection('votes').where('week', '==', c.targetWeek), snap => {
      const v = {};
      snap.forEach(d => { const x = d.data(); v[x.memberId] = Object.keys(x.cells || {}).sort(); });
      S.votes = v;
      if (S.pendingCells === null && S.user && v[S.user.id]) S.pendingCells = [...v[S.user.id]];
      render();
    });
    on(db.doc('results/' + c.targetWeek), d => { S.results = d.exists ? d.data() : null; S.verify = null; render(); maybeVerify(); });
    on(db.collection('bookings').where('week', '==', c.targetWeek), snap => {
      const b = {}; snap.forEach(d => b[d.data().cellKey] = d.data()); S.bookings = b; render();
    });
    on(db.doc('results/' + c.votingWeek), d => { S.curResults = d.exists ? d.data() : null; render(); });
    on(db.collection('bookings').where('week', '==', c.votingWeek), snap => {
      const b = {}; snap.forEach(d => b[d.data().cellKey] = d.data()); S.curBookings = b; render();
    });
  }

  /* 주가 바뀌면(월요일 00시 통과) 리스너 재구성 */
  setInterval(() => { if (S.uid && listenWeeks !== cycle().targetWeek) { S.results = null; S.votes = {}; S.bookings = {}; S.pendingCells = null; resubscribe(); } }, 30000);

  async function fetchWeekVotes(week) {
    const snap = await db.collection('votes').where('week', '==', week).get();
    const v = {};
    snap.forEach(d => { const x = d.data(); v[x.memberId] = Object.keys(x.cells || {}).sort(); });
    return v;
  }

  return {
    start,
    now: () => Date.now(),
    async claim(memberId, pin) {
      const m = S.members[memberId];
      if (!m) throw new Error('멤버를 찾을 수 없습니다.');
      const h = pinHashOf(memberId, pin);
      if (m.pinHash && m.pinHash !== h) throw new Error('PIN이 일치하지 않습니다.');
      const ref = db.doc('members/' + memberId);
      await ref.update({ pinHash: h, uids: FV.arrayUnion(S.uid) });
      await db.doc('uidmap/' + S.uid).set({ memberId });
      localStorage.setItem('wss_member', memberId);
      S.user = { id: memberId, name: m.name, isAdmin: !!m.isAdmin };
      S.pendingCells = null;
      render();
    },
    logout() { localStorage.removeItem('wss_member'); S.user = null; S.pendingCells = null; render(); },
    async saveVotes(cells) {
      const c = cycle();
      const cellsMap = {}; cells.forEach(k => cellsMap[k] = true);
      await db.doc(`votes/${c.targetWeek}_${S.user.id}`).set({
        week: c.targetWeek, memberId: S.user.id, cells: cellsMap, updatedAt: FV.serverTimestamp(),
      });
    },
    async deleteVotes() {
      const c = cycle();
      await db.doc(`votes/${c.targetWeek}_${S.user.id}`).delete();
    },
    async ensureResults() {
      const c = cycle();
      if (S.results || S.ensuring || now() < c.announce) return;
      S.ensuring = true;
      try {
        const v = await fetchWeekVotes(c.targetWeek);
        const r = computeLottery(v);
        await db.doc('results/' + c.targetWeek).set({
          week: c.targetWeek, seed: r.seed, assignments: r.assignments,
          priorityMembers: r.priorityMembers, votesJson: r.canonical,
          createdAt: FV.serverTimestamp(), createdByUid: S.uid,
        });
        toast('추첨 결과가 확정·발표되었습니다.', 'okk');
      } catch (e) {
        if (!/permission|already/i.test(e.message)) console.error(e);
      } finally { S.ensuring = false; }
    },
    async verifyResults(week, resultsDoc) {
      const v = await fetchWeekVotes(week);
      const r = computeLottery(v);
      const ok = r.seed === resultsDoc.seed && JSON.stringify(r.assignments) === JSON.stringify(resultsDoc.assignments)
        && JSON.stringify([...r.priorityMembers].sort()) === JSON.stringify([...(resultsDoc.priorityMembers||[])].sort());
      return { ok, recomputed: r };
    },
    async book(cellKey) {
      const c = cycle();
      await db.doc(`bookings/${c.targetWeek}_${cellKey}`).set({
        week: c.targetWeek, cellKey, memberId: S.user.id, uid: S.uid, createdAt: FV.serverTimestamp(),
      });
    },
    async unbook(cellKey, week) {
      await db.doc(`bookings/${week}_${cellKey}`).delete();
    },
    async loadHistory(week) {
      const [rd, votes, bsnap] = await Promise.all([
        db.doc('results/' + week).get(), fetchWeekVotes(week),
        db.collection('bookings').where('week', '==', week).get(),
      ]);
      const bookings = {}; bsnap.forEach(d => bookings[d.data().cellKey] = d.data());
      return { results: rd.exists ? rd.data() : null, votes, bookings };
    },
    admin: {
      async bootstrap(name, pin) {
        const ref = db.collection('members').doc();
        const h = pinHashOf(ref.id, pin);
        await ref.set({ name, pinHash: h, uids: [S.uid], isAdmin: true, active: true, createdAt: FV.serverTimestamp() });
        await db.doc('config/app').set({ priorityWindowMin: 60, bookingDayCapEnabled: false, createdAt: FV.serverTimestamp() });
        await db.doc('uidmap/' + S.uid).set({ memberId: ref.id });
        localStorage.setItem('wss_member', ref.id);
      },
      addMember: (name) => db.collection('members').add({ name, pinHash: null, uids: [], isAdmin: false, active: true, createdAt: FV.serverTimestamp() }),
      setActive: (id, active) => db.doc('members/' + id).update({ active }),
      setAdmin: (id, isAdmin) => db.doc('members/' + id).update({ isAdmin }),
      resetPin: (id) => db.doc('members/' + id).update({ pinHash: null }),
      resetDevices: (id) => db.doc('members/' + id).update({ uids: [] }),
      removeMember: (id) => db.doc('members/' + id).delete(),
      saveConfig: (cfg) => db.doc('config/app').set(cfg, { merge: true }),
      deleteResults: (week) => db.doc('results/' + week).delete(),
    },
  };
}

/* ---------------- Demo store (Firebase 미설정 시) ---------------- */
function makeDemoStore() {
  const mem = {
    members: {}, votes: {}, results: {}, bookings: {},
    config: { priorityWindowMin: 60, bookingDayCapEnabled: false },
  };
  ['김데모', '이샘플', '박예시', '최가상', '정테스트', '한체험'].forEach((n, i) => {
    mem.members['m' + i] = { id: 'm' + i, name: n, pinHash: null, uids: [], isAdmin: i === 0, active: true };
  });
  // 데모 투표 생성 (재현 가능하도록 고정 패턴)
  const c0 = phaseOf(Date.now());
  const demoVotes = {
    m1: ['D0-1', 'D0-2', 'N1-1'], m2: ['D0-1', 'W1-2'], m3: ['D1-3', 'D2-3', 'N2-2'],
    m4: ['D0-1', 'N1-1', 'W2-4'], m5: ['D1-3', 'W0-1', 'W1-2', 'N3-4'],
  };
  mem.votes[c0.targetWeek] = demoVotes;

  function pushState() {
    const c = cycle();
    S.members = { ...mem.members };
    S.config = { ...mem.config };
    S.votes = { ...(mem.votes[c.targetWeek] || {}) };
    if (S.pendingCells === null && S.user && S.votes[S.user.id]) S.pendingCells = [...S.votes[S.user.id]];
    S.results = mem.results[c.targetWeek] || null;
    S.bookings = { ...(mem.bookings[c.targetWeek] || {}) };
    S.curResults = mem.results[c.votingWeek] || null;
    S.curBookings = { ...(mem.bookings[c.votingWeek] || {}) };
    S.connected = true;
    render();
  }

  return {
    start() { S.uid = 'demo-uid'; pushState(); },
    now: () => Date.now(),
    async claim(memberId, pin) {
      const m = mem.members[memberId];
      const h = pinHashOf(memberId, pin);
      if (m.pinHash && m.pinHash !== h) throw new Error('PIN이 일치하지 않습니다.');
      m.pinHash = h; if (!m.uids.includes(S.uid)) m.uids.push(S.uid);
      S.user = { id: memberId, name: m.name, isAdmin: !!m.isAdmin };
      S.pendingCells = null; pushState();
    },
    logout() { S.user = null; S.pendingCells = null; pushState(); },
    async saveVotes(cells) {
      const c = cycle();
      (mem.votes[c.targetWeek] = mem.votes[c.targetWeek] || {})[S.user.id] = [...cells].sort();
      pushState();
    },
    async deleteVotes() {
      const c = cycle();
      delete (mem.votes[c.targetWeek] || {})[S.user.id]; pushState();
    },
    async ensureResults() {
      const c = cycle();
      if (mem.results[c.targetWeek] || now() < c.announce) return;
      const r = computeLottery(mem.votes[c.targetWeek] || {});
      mem.results[c.targetWeek] = {
        week: c.targetWeek, seed: r.seed, assignments: r.assignments,
        priorityMembers: r.priorityMembers, votesJson: r.canonical, createdAt: Date.now(),
      };
      toast('(데모) 추첨 결과가 확정·발표되었습니다.', 'okk'); pushState();
    },
    async verifyResults(week, doc) {
      const r = computeLottery(mem.votes[week] || {});
      return { ok: r.seed === doc.seed && JSON.stringify(r.assignments) === JSON.stringify(doc.assignments), recomputed: r };
    },
    async book(cellKey) {
      const c = cycle();
      const b = mem.bookings[c.targetWeek] = mem.bookings[c.targetWeek] || {};
      if (b[cellKey]) throw new Error('이미 예약된 슬롯입니다.');
      b[cellKey] = { week: c.targetWeek, cellKey, memberId: S.user.id, createdAt: Date.now() };
      pushState();
    },
    async unbook(cellKey, week) { delete (mem.bookings[week] || {})[cellKey]; pushState(); },
    async loadHistory(week) {
      return { results: mem.results[week] || null, votes: mem.votes[week] || {}, bookings: mem.bookings[week] || {} };
    },
    admin: {
      async bootstrap(name, pin) {
        const id = 'm' + Object.keys(mem.members).length;
        mem.members[id] = { id, name, pinHash: pinHashOf(id, pin), uids: [S.uid], isAdmin: true, active: true };
        S.user = { id, name, isAdmin: true };
        pushState();
      },
      addMember: async (name) => { const id = 'm' + Math.random().toString(36).slice(2, 8); mem.members[id] = { id, name, pinHash: null, uids: [], isAdmin: false, active: true }; pushState(); },
      setActive: async (id, active) => { mem.members[id].active = active; pushState(); },
      setAdmin: async (id, isAdmin) => { mem.members[id].isAdmin = isAdmin; pushState(); },
      resetPin: async (id) => { mem.members[id].pinHash = null; pushState(); },
      resetDevices: async (id) => { mem.members[id].uids = []; pushState(); },
      removeMember: async (id) => { delete mem.members[id]; pushState(); },
      saveConfig: async (cfg) => { Object.assign(mem.config, cfg); pushState(); },
      deleteResults: async (week) => { delete mem.results[week]; pushState(); },
    },
    _demo: { pushState },
  };
}

function restoreSession() {
  if (S.user) return;
  const id = localStorage.getItem('wss_member');
  if (id && S.members[id] && S.members[id].active !== false &&
      (IS_DEMO || (S.members[id].uids || []).includes(S.uid))) {
    const m = S.members[id];
    S.user = { id, name: m.name, isAdmin: !!m.isAdmin };
  }
}

async function maybeVerify() {
  if (!S.results || S.verify || S._verifying) return;
  S._verifying = true;
  try {
    const v = await store.verifyResults(cycle().targetWeek, S.results);
    S.verify = v.ok ? { ok: true } : { ok: false };
    render();
  } catch (e) { /* 읽기 실패 시 보류 */ }
  finally { S._verifying = false; }
}

/* =====================================================================
 * 렌더링
 * ===================================================================== */
const TABS = [
  ['dash', '📊 현황'], ['vote', '🗳️ 토큰 투표'], ['book', '⚡ 선착순 예약'],
  ['results', '🎲 추첨 결과'], ['members', '👥 명단'], ['rules', '📖 규칙'], ['admin', '🔧 관리자'],
];

function render() {
  renderHeader(); renderPhasebar(); renderTabs();
  const c = cycle();
  if (c.phase === 'BOOKING' && !S.results && S.uid && S.connected) store.ensureResults();
  if (S.results && !S.verify) maybeVerify();
  const fn = {
    dash: renderDash, vote: renderVote, book: renderBook,
    results: renderResults, members: renderMembers, rules: renderRules, admin: renderAdmin,
  }[S.tab];
  $('#main').innerHTML = fn ? fn() : '';
  bindMain();
}

function renderHeader() {
  const c = cycle();
  $('#weekLabel').textContent = `대상 주: ${weekLabel(c.targetWeek)}`;
  let h = '';
  if (S.authError) h += `<span class="badge b-red">연결 오류</span>`;
  if (S.user) {
    h += `<span class="userchip"><span class="dot"></span>${esc(S.user.name)}${S.user.isAdmin ? ' <span class="badge b-violet">관리자</span>' : ''}</span>
          <button class="btn sm" id="btnLogout">로그아웃</button>`;
  } else {
    h += `<button class="btn primary" id="btnLogin">멤버 로그인</button>`;
  }
  $('#headRight').innerHTML = h;
  $('#btnLogin')?.addEventListener('click', openLogin);
  $('#btnLogout')?.addEventListener('click', () => store.logout());
  $('#demoBanner').innerHTML = IS_DEMO
    ? `<div class="demo-banner"><b>데모 모드</b> — Firebase 설정이 비어 있어 가상 데이터로 동작 중입니다 (새로고침 시 초기화, 다른 사람과 공유 안 됨). 설치 가이드에 따라 FIREBASE_CONFIG를 입력하면 실제 모드로 전환됩니다.
       &nbsp;국면 미리보기: <button class="btn sm" data-demo="vote">투표중</button> <button class="btn sm" data-demo="wait">추첨 대기</button> <button class="btn sm" data-demo="book">발표·예약</button></div>`
    : (S.authError ? `<div class="demo-banner"><b>⚠ ${esc(S.authError)}</b></div>` : '');
  document.querySelectorAll('[data-demo]').forEach(b => b.addEventListener('click', () => {
    const c2 = phaseOf(Date.now());
    const mode = b.dataset.demo;
    if (mode === 'vote') S.demoOffset = c2.monday + 3600000 * 26 - Date.now();          // 화요일 02시
    if (mode === 'wait') S.demoOffset = c2.monday + 3 * DAY_MS + 3600000 * 9 - Date.now();  // 목 09시
    if (mode === 'book') S.demoOffset = c2.monday + 3 * DAY_MS + 3600000 * 12.5 - Date.now(); // 목 12:30
    S.results = null; S.verify = null;
    store._demo?.pushState();
  }));
}

function renderPhasebar() {
  const c = cycle();
  const P = c.phase;
  const badge = P === 'VOTING' ? '<span class="badge b-accent">1단계 · 토큰 투표 진행중</span>'
    : P === 'WAITING' ? '<span class="badge b-amber">2단계 · 투표 마감 — 추첨 대기</span>'
    : inPriorityWindow(c) ? '<span class="badge b-violet">3단계 · 우선예약 진행중 (Day 탈락자 전용)</span>'
    : '<span class="badge b-green">3단계 · 선착순 예약 진행중</span>';
  const target = P === 'VOTING' ? c.voteClose : P === 'WAITING' ? c.announce
    : inPriorityWindow(c) ? priorityWindowEnd(c) : weekStartMs(c.targetWeek + 1);
  const targetLabel = P === 'VOTING' ? '투표 마감까지' : P === 'WAITING' ? '추첨 발표까지'
    : inPriorityWindow(c) ? '전체 예약 오픈까지' : '대상 주 종료까지';
  const steps = [
    ['투표', `월 00:00 ~ 수 24:00`, P === 'VOTING' ? 'on' : 'done'],
    ['마감·추첨 대기', `목 00:00 ~ 12:00`, P === 'WAITING' ? 'on' : (P === 'VOTING' ? '' : 'done')],
    ['발표 + 우선예약', `목 12:00 (${S.config.priorityWindowMin}분간)`, P === 'BOOKING' && inPriorityWindow(c) ? 'on' : (P === 'BOOKING' ? 'done' : '')],
    ['전체 선착순 예약', `이후 ~ 대상 주 일요일`, P === 'BOOKING' && !inPriorityWindow(c) ? 'on' : ''],
  ];
  $('#phasebar').innerHTML = `
    <div class="toprow">${badge}
      <span class="muted">${targetLabel}</span>
      <span class="countdown" id="cd" data-target="${target}">${fmtDur(target - now())}</span>
      <span class="muted" style="margin-left:auto">투표 대상: <b>${weekLabel(c.targetWeek)}</b> 스케줄</span>
    </div>
    <div class="steps">${steps.map(s => `<div class="step ${s[2]}"><b>${s[0]}</b>${s[1]}</div>`).join('')}</div>`;
}

function renderTabs() {
  $('#tabs').innerHTML = TABS
    .filter(([k]) => k !== 'admin' || S.user?.isAdmin)
    .map(([k, l]) => `<button class="${S.tab === k ? 'on' : ''}" data-tab="${k}">${l}</button>`).join('');
  document.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => { S.tab = b.dataset.tab; render(); }));
}

/* ---------------- 그리드 공통 ---------------- */
function myVoteSet() { return new Set(S.user ? (S.votes[S.user.id] || []) : []); }
function cellState(cellKey, ctx) {
  // ctx: {results, bookings, phase} → 표시 상태 결정
  const a = ctx.results?.assignments?.[cellKey];
  if (a) return { type: 'lottery', member: a };
  const b = ctx.bookings[cellKey];
  if (b) return { type: 'booked', member: b.memberId };
  return { type: 'empty' };
}
function gridHtml(mode) {
  // mode: 'status' | 'vote' | 'book' | 'thisweek'
  const c = cycle();
  const isThis = mode === 'thisweek';
  const ctx = isThis ? { results: S.curResults, bookings: S.curBookings } : { results: S.results, bookings: S.bookings };
  const pending = new Set(S.pendingCells || []);
  const counts = {};
  if (!isThis) for (const [m, cells] of Object.entries(S.votes)) for (const k of cells) counts[k] = (counts[k] || 0) + 1;

  let rows = '', lastPeriod = '';
  for (const sd of SLOT_DEFS) {
    if (sd.period !== lastPeriod) {
      lastPeriod = sd.period;
      const label = { Day: 'Day · 06-18시', Night: 'Night · 18시-익일 06시', Weekend: 'Weekend · 금/토/일' }[sd.period];
      rows += `<tr class="periodrow"><td colspan="5">${label}</td></tr>`;
    }
    let tds = '';
    for (const b of BATCHES) {
      const key = `${sd.key}-${b}`;
      let cls = 'cell', inner = '', click = '';
      if (mode === 'vote') {
        const cnt = counts[key] || 0;
        const cntOthers = cnt - (myVoteSet().has(key) ? 1 : 0);
        if (pending.has(key)) { cls += ' mine clickable'; inner = '내 토큰'; }
        else { cls += ' clickable'; inner = '<span class="tag">지원</span>'; }
        if (cnt > 0) inner += `<span class="cnt" title="현재 지원자 수">${cnt}</span>`;
        click = ` data-cell="${key}" data-act="togglevote"`;
        if (cntOthers > 0 && !pending.has(key)) inner = `<span class="tag">경쟁 ${cntOthers}명</span>` + `<span class="cnt">${cnt}</span>`;
      } else {
        const st = cellState(key, ctx);
        if (st.type === 'lottery') {
          cls += ' lottery' + (S.user && st.member === S.user.id ? ' minewin' : '');
          inner = `${esc(memberName(st.member))}<span class="tag">추첨 확정</span>`;
        } else if (st.type === 'booked') {
          cls += ' booked' + (S.user && st.member === S.user.id ? ' minewin' : '');
          inner = `${esc(memberName(st.member))}<span class="tag">예약</span>`;
          if (mode === 'book' && S.user && st.member === S.user.id) { cls += ' clickable'; click = ` data-cell="${key}" data-act="unbook"`; inner += '<span class="tag">(클릭해 취소)</span>'; }
        } else {
          if (mode === 'book' && c.phase === 'BOOKING' && !isThis) {
            cls += ' empty-book clickable'; inner = '예약 가능'; click = ` data-cell="${key}" data-act="book"`;
          } else if ((mode === 'status') && c.phase === 'BOOKING') {
            cls += ' empty-book'; inner = '빈 슬롯';
          } else if (isThis) {
            cls += ' disabled'; inner = '-';
          } else {
            const cnt = counts[key] || 0;
            if (c.phase !== 'BOOKING' && cnt > 0) inner = `<span class="tag">지원 ${cnt}명</span>`;
            else { cls += ' disabled'; inner = ''; }
            if (S.user && myVoteSet().has(key)) { cls += ' mine'; inner = '내 토큰' + (cnt > 1 ? `<span class="cnt">${cnt}</span>` : ''); }
          }
        }
      }
      tds += `<td class="${cls}"${click}>${inner}</td>`;
    }
    rows += `<tr><td class="rowh">${sd.label}<small>${sd.period}</small></td>${tds}</tr>`;
  }
  return `<div class="gridwrap"><table class="sched">
    <tr><th class="rowh">시간표</th>${BATCHES.map(b => `<th>Batch #${b}</th>`).join('')}</tr>${rows}</table></div>
    <div class="legend">
      <span><span class="sw" style="background:var(--accent-soft);border-color:var(--accent)"></span>내 토큰/추첨 확정</span>
      <span><span class="sw" style="background:var(--green-soft);border-color:#bfe6d2"></span>선착순 예약</span>
      <span><span class="sw" style="border-style:dashed"></span>예약 가능(빈 슬롯)</span>
      <span><span class="sw" style="background:#fff"></span>지원자 수는 우측 상단 숫자</span>
    </div>`;
}

/* ---------------- 탭: 현황 ---------------- */
function renderDash() {
  const c = cycle();
  const myVotes = S.user ? (S.votes[S.user.id] || []) : [];
  const used = myVotes.length;
  const nMembers = Object.values(S.members).filter(m => m.active !== false).length;
  const nVoters = Object.keys(S.votes).length;
  const nAssigned = S.results ? Object.keys(S.results.assignments || {}).length : 0;
  const nBooked = Object.keys(S.bookings).length;
  let prio = '';
  if (S.results?.priorityMembers?.length && c.phase === 'BOOKING') {
    prio = `<div class="prio-banner">🎗 <b>Day 우선예약 대상자</b> (Day에 토큰을 냈으나 한 번도 선정되지 못한 인원): ${S.results.priorityMembers.map(m => esc(memberName(m))).join(', ')}
      ${inPriorityWindow(c) ? ` — <b>${fmtDT(priorityWindowEnd(c))}까지 이분들만 예약 가능</b>` : ' (우선예약 시간 종료됨)'}</div>`;
  }
  return `
    ${prio}
    <div class="card"><h2>다음 주 (${weekLabel(c.targetWeek)}) 진행 현황</h2>
      <div class="grid2" style="margin-bottom:12px">
        <div class="flexrow" style="gap:14px">
          <div class="stat"><b>${nVoters}/${nMembers}</b><span>투표 참여 인원</span></div>
          <div class="stat"><b>${c.phase === 'BOOKING' ? nAssigned : '–'}</b><span>추첨 확정 슬롯</span></div>
          <div class="stat"><b>${c.phase === 'BOOKING' ? nBooked : '–'}</b><span>선착순 예약 슬롯</span></div>
        </div>
        <div>
          ${S.user ? `<div class="flexrow">내 토큰 (이번 주): <span class="tokens">${BATCHES.map((_, i) => `<span class="tok ${i < used ? 'used' : ''}">${i < used ? '✓' : '●'}</span>`).join('')}</span> <span class="muted">${TOKENS_PER_WEEK - used}개 남음</span></div>
          <div class="muted" style="margin-top:6px">내 투표: ${myVotes.length ? myVotes.map(k => cellLabel(k)).join(', ') : '없음'}</div>`
          : '<div class="note">로그인하면 내 토큰 현황이 표시됩니다.</div>'}
        </div>
      </div>
      ${gridHtml('status')}
    </div>
    <div class="card"><h2>이번 주 (${weekLabel(c.votingWeek)}) 확정 스케줄</h2>
      ${S.curResults || Object.keys(S.curBookings).length ? gridHtml('thisweek') : '<p class="muted">이번 주 확정 스케줄 데이터가 없습니다. (지난주에 시스템 미사용 또는 데이터 없음)</p>'}
    </div>`;
}
function cellLabel(key) {
  const { slot, batch } = parseCell(key);
  const sd = SLOT_DEFS.find(s => s.key === slot);
  return `${sd.label}·#${batch}`;
}

/* ---------------- 탭: 투표 ---------------- */
function renderVote() {
  const c = cycle();
  if (!S.user) return `<div class="card"><h2>토큰 투표</h2><p class="muted">투표하려면 먼저 우측 상단에서 멤버 로그인을 해주세요.</p></div>`;
  if (c.phase !== 'VOTING') {
    return `<div class="card"><h2>토큰 투표</h2>
      <p class="muted">지금은 투표 기간이 아닙니다. 투표는 <b>매주 월요일 00:00 ~ 수요일 24:00</b>에 진행됩니다.
      다음 투표 시작: <b>${fmtDT(weekStartMs(c.votingWeek + 1))}</b></p>
      ${S.votes[S.user.id]?.length ? `<div class="note">이번 주 내 투표(마감됨): ${(S.votes[S.user.id]).map(cellLabel).join(', ')}</div>` : ''}</div>`;
  }
  if (S.pendingCells === null) S.pendingCells = [...(S.votes[S.user.id] || [])];
  const pending = S.pendingCells;
  const saved = JSON.stringify([...(S.votes[S.user.id] || [])].sort()) === JSON.stringify([...pending].sort());
  const err = validateVoteSet(pending);
  return `<div class="card">
    <h2>토큰 투표 — ${weekLabel(c.targetWeek)} 대상</h2>
    <div class="flexrow" style="margin-bottom:8px">
      <span>남은 토큰:</span>
      <span class="tokens">${BATCHES.map((_, i) => `<span class="tok ${i < pending.length ? 'used' : ''}">${i < pending.length ? '✓' : '●'}</span>`).join('')}</span>
      <b>${TOKENS_PER_WEEK - pending.length}개</b>
      <span style="margin-left:auto" class="${saved ? 'muted' : 'verify-bad'}">${saved ? '저장됨 ✓' : '변경사항 있음 — 저장 필요!'}</span>
    </div>
    <p class="muted" style="margin-bottom:8px">원하는 칸을 눌러 토큰을 배치하세요. 같은 시간표에 2개 이상 배치하면 그 시간표에서 <b>우선권</b>을 가지며, <b>묶음(전부 당첨 또는 전부 탈락)</b>으로 처리됩니다. Day 시간대는 주당 최대 2배치까지만 배정됩니다.</p>
    ${err ? `<div class="note" style="color:var(--red)">⚠ ${err}</div>` : ''}
    ${gridHtml('vote')}
    <div class="flexrow" style="margin-top:14px">
      <button class="btn primary" id="btnSaveVotes" ${err || saved ? 'disabled' : ''}>투표 저장</button>
      <button class="btn" id="btnResetVotes">저장된 상태로 되돌리기</button>
      <button class="btn danger" id="btnClearVotes">투표 전체 취소</button>
      <span class="muted">마감: ${fmtDT(c.voteClose)} (수요일 24시)</span>
    </div></div>`;
}

/* ---------------- 탭: 예약 ---------------- */
function renderBook() {
  const c = cycle();
  if (c.phase !== 'BOOKING') {
    return `<div class="card"><h2>선착순 예약</h2><p class="muted">예약은 <b>목요일 12:00 추첨 발표 직후</b>부터 가능합니다. 오픈까지: <span class="countdown" data-target="${c.announce}">${fmtDur(c.announce - now())}</span></p></div>`;
  }
  if (!S.user) return `<div class="card"><h2>선착순 예약</h2><p class="muted">예약하려면 먼저 로그인해주세요.</p></div>`;
  const inPrio = inPriorityWindow(c);
  const amPrio = S.results?.priorityMembers?.includes(S.user.id);
  let banner = '';
  if (inPrio) {
    banner = amPrio
      ? `<div class="prio-banner">🎗 회원님은 <b>Day 우선예약 대상자</b>입니다. ${fmtDT(priorityWindowEnd(c))}까지 우선적으로 예약할 수 있습니다.</div>`
      : `<div class="prio-banner">지금은 <b>Day 탈락자 우선예약 시간</b>입니다 (${fmtDT(priorityWindowEnd(c))}까지). 대상자: ${(S.results?.priorityMembers || []).map(m => esc(memberName(m))).join(', ')}. 이후 전체 오픈됩니다.</div>`;
  }
  const myBookings = Object.entries(S.bookings).filter(([, b]) => b.memberId === S.user.id).map(([k]) => k);
  const dayCapNote = S.config.bookingDayCapEnabled ? `<div class="note">이 연구실 설정: 선착순 예약 단계에도 Day 주간 2배치 제한이 적용됩니다.</div>` : '';
  return `${banner}<div class="card">
    <h2>선착순 실시간 예약 — ${weekLabel(c.targetWeek)} 대상</h2>
    <p class="muted">빈 슬롯(점선)을 누르면 즉시 예약됩니다. 예약은 서버에서 원자적으로 처리되어 정확히 선착순이 보장됩니다. 내 예약 칸을 누르면 취소됩니다.</p>
    ${dayCapNote}
    ${gridHtml('book')}
    <h3>내 예약 (${myBookings.length}건)</h3>
    <p class="muted">${myBookings.length ? myBookings.map(cellLabel).join(', ') : '아직 없습니다.'}</p>
  </div>`;
}

/* ---------------- 탭: 결과 ---------------- */
function renderResults() {
  const c = cycle();
  const weekOpts = [];
  for (let w = c.targetWeek; w >= c.targetWeek - 8; w--) weekOpts.push(w);
  const sel = S.resultsWeek ?? c.targetWeek;
  const isCurrent = sel === c.targetWeek;
  const data = isCurrent ? { results: S.results, votes: S.votes, bookings: S.bookings } : S.histCache[sel];
  let body = '';
  if (!isCurrent && !data) {
    body = '<p class="muted">불러오는 중...</p>';
    store.loadHistory(sel).then(async d => {
      let verify = null;
      if (d.results) { try { verify = await store.verifyResults(sel, d.results); } catch (e) {} }
      S.histCache[sel] = { ...d, verify }; render();
    }).catch(() => { S.histCache[sel] = { results: null, votes: {}, bookings: {}, failed: true }; render(); });
  } else if (!data?.results) {
    body = isCurrent && c.phase !== 'BOOKING'
      ? `<p class="muted">추첨 발표 전입니다. 발표: <b>${fmtDT(c.announce)}</b> (목요일 12:00). 발표 즉시 이 화면에 자동 표시됩니다.</p>`
      : '<p class="muted">해당 주차의 추첨 결과 데이터가 없습니다.</p>';
  } else {
    const r = data.results;
    const verify = isCurrent ? S.verify : data.verify && { ok: data.verify.ok };
    const vbadge = verify == null ? '<span class="badge b-gray">검증 중...</span>'
      : verify.ok ? '<span class="badge b-green">✓ 검증 완료 — 투표 데이터로부터 재계산한 결과와 일치</span>'
      : '<span class="badge b-red">⚠ 검증 불일치 — 관리자에게 결과 재생성을 요청하세요</span>';
    const rows = Object.entries(r.assignments || {}).sort().map(([k, m]) =>
      `<tr><td>${cellLabel(k)}</td><td><b>${esc(memberName(m))}</b></td><td><span class="badge b-accent">추첨</span></td></tr>`).join('');
    const brows = Object.entries(data.bookings || {}).sort().map(([k, b]) =>
      `<tr><td>${cellLabel(k)}</td><td><b>${esc(memberName(b.memberId))}</b></td><td><span class="badge b-green">선착순 예약</span></td></tr>`).join('');
    body = `
      <div class="flexrow" style="margin-bottom:10px">${vbadge}</div>
      <h3>추첨 배정 (${Object.keys(r.assignments || {}).length}건)</h3>
      ${rows ? `<table class="list"><tr><th>슬롯</th><th>배정자</th><th>방식</th></tr>${rows}</table>` : '<p class="muted">추첨 배정 없음 (투표 없음)</p>'}
      <h3>선착순 예약 (${Object.keys(data.bookings || {}).length}건)</h3>
      ${brows ? `<table class="list"><tr><th>슬롯</th><th>예약자</th><th>방식</th></tr>${brows}</table>` : '<p class="muted">아직 없음</p>'}
      <h3>Day 우선예약 대상자</h3>
      <p class="muted">${(r.priorityMembers || []).length ? r.priorityMembers.map(m => esc(memberName(m))).join(', ') : '없음'}</p>
      <h3>공정성 증빙</h3>
      <p class="muted" style="word-break:break-all">추첨 시드(전체 투표 데이터의 SHA-256): <code class="k">${esc(r.seed || '')}</code><br>
      시드는 마감된 투표 내용 자체로부터 결정되므로 누구도(관리자 포함) 추첨 결과를 조작하거나 미리 알 수 없으며, 모든 접속자의 브라우저가 결과를 독립적으로 재계산하여 위 배지로 일치 여부를 표시합니다.</p>`;
  }
  return `<div class="card">
    <div class="flexrow"><h2 style="margin:0">추첨 결과</h2>
      <select id="selWeek" style="margin-left:auto;border:1.5px solid var(--line);border-radius:8px;padding:6px 10px;font-family:inherit">
        ${weekOpts.map(w => `<option value="${w}" ${w === sel ? 'selected' : ''}>${weekLabel(w)}${w === c.targetWeek ? ' (다음 주)' : w === c.votingWeek ? ' (이번 주)' : ''}</option>`).join('')}
      </select></div>
    <div style="margin-top:10px">${body}</div></div>`;
}

/* ---------------- 탭: 규칙 ---------------- */
function renderRules() {
  return `<div class="card rules"><h2>📖 운영 규칙 및 내부 프로세스</h2>

  <h3>1. 토큰 제도</h3>
  <ul>
    <li>'명단'에 등록된 멤버 1인당 <b>매주 토큰 4개</b> 지급.</li>
    <li>매주 <b>월요일 00:00(KST)</b> 자동 초기화. 미사용 토큰은 이월되지 않음.</li>
    <li>토큰 1개 = 특정 [요일 + 시간대 + 배치] 1칸에 대한 지원권 1회.</li>
  </ul>

  <h3>2. 시간표 구조</h3>
  <ul>
    <li><b>[Day]</b> 월/화/수/목 06:00–18:00 (요일별 4개 슬롯)</li>
    <li><b>[Night]</b> 월/화/수/목 18:00–익일 06:00 (요일별 4개 슬롯)</li>
    <li><b>[Weekend]</b> 금/토/일 (요일별 3개 슬롯)</li>
    <li>각 슬롯은 합성 Batch <b>#1 / #2 / #3 / #4</b>로 세분 → 주당 총 44칸.</li>
  </ul>

  <h3>3. 주간 사이클 (모든 시각은 KST 기준, 서버가 강제)</h3>
  <ul>
    <li><b>월 00:00 ~ 수 24:00</b> — 토큰 투표. 이 기간 중 자유롭게 수정/취소 가능.</li>
    <li><b>목 00:00</b> — 투표 마감. 이후 투표 데이터는 서버 규칙에 의해 영구 동결.</li>
    <li><b>목 12:00</b> — 추첨 결과 자동 발표 + 우선예약 시작.</li>
    <li><b>우선예약 종료 후 ~ 대상 주 일요일 24:00</b> — 전체 선착순 예약.</li>
    <li>투표·추첨·예약은 모두 <b>다음 주(월~일) 스케줄</b>을 대상으로 함.</li>
  </ul>

  <h3>4. 추첨 규칙 (목 12:00)</h3>
  <ul>
    <li>(1) 동일 슬롯의 동일 Batch에는 <b>단 1인만</b> 배정. 경합 시 무작위 추첨.</li>
    <li>(2) <b>Day 시간대는 1인당 주간 최대 2개 Batch</b>까지만 배정.</li>
    <li>(3) 동일 슬롯에 서로 다른 Batch를 <b>2개 이상 투표한 사람(묶음 투표)은 우선권</b>을 가짐. 이런 사람이 2명 이상이고 Batch가 하나라도 겹치면 그들끼리 무작위 추첨.</li>
    <li>(4) 묶음 투표는 <b>전부-또는-전무</b>: 해당 슬롯에서 모두 배정되거나 모두 탈락 (일부만 확정되는 경우 없음).</li>
    <li>처리 순서: 슬롯을 고정 순서(Day 월→목, Night 월→목, Weekend 금→일)로 순회하며, 각 슬롯에서 ① 묶음 투표(무작위 순서 배정) → ② 단일 투표(Batch별 무작위 추첨) 순으로 확정.</li>
    <li>파생 규칙: 하나의 Day 슬롯에 3개 이상 Batch 묶음은 규칙 (2)+(4)의 조합상 절대 당첨될 수 없으므로 <b>투표 자체가 차단</b>됨.</li>
  </ul>

  <h3>5. 무작위성·공정성 보장 방식</h3>
  <ul>
    <li>추첨 시드 = <b>마감된 전체 투표 데이터의 SHA-256 해시</b>. 즉, 추첨 결과는 투표 내용에 의해서만 결정.</li>
    <li>마감 전에는 최종 투표 집합을 누구도 알 수 없으므로 시드 예측·조작이 불가능.</li>
    <li>모든 접속자의 브라우저가 동일한 알고리즘으로 결과를 <b>독립 재계산·검증</b>하며, 게시된 결과와 다르면 경고 배지가 표시됨.</li>
    <li>결과 문서는 생성 후 수정 불가(서버 규칙). 불일치 시에만 관리자가 삭제 후 재생성.</li>
  </ul>

  <h3>6. 선착순 예약 (목 12:00 이후)</h3>
  <ul>
    <li>추첨 후 빈 칸에 대해 <b>1인당 횟수 제한 없이</b> 실시간 예약 가능.</li>
    <li><b>우선예약</b>: Day에 토큰을 1개 이상 냈으나 Day에 한 번도 선정되지 못한 인원은 발표 직후 일정 시간(기본 60분, 관리자 설정) 동안 <b>단독으로</b> 예약 가능. 그 후 전체 오픈.</li>
    <li>예약은 서버에서 원자적으로 처리 — 동시에 눌러도 정확히 1명만 성공.</li>
    <li>본인 예약은 본인이 취소 가능 (취소 즉시 빈 슬롯으로 전환).</li>
    <li>Day 2배치 제한의 예약 단계 적용 여부는 연구실 정책에 따라 관리자가 설정 (기본: 미적용).</li>
  </ul>

  <h3>7. 편법·오류 방지책</h3>
  <ul>
    <li><b>시계 조작</b> → 모든 마감·오픈 시각은 서버(Firestore Security Rules)가 서버 시각으로 강제. 클라이언트 시계와 무관.</li>
    <li><b>토큰 초과/중복 투표</b> → 투표는 1인당 단일 문서로 저장되며 서버 규칙이 개수(≤4)·유효 슬롯·본인 여부를 검증.</li>
    <li><b>타인 사칭</b> → 멤버별 PIN + 기기 바인딩. 본인 확인된 기기만 해당 멤버로 쓰기 가능. 분실 시 관리자가 기기/PIN 초기화.</li>
    <li><b>마감 후 투표 수정</b> → 서버 규칙이 시간창 밖의 쓰기를 전면 거부. 투표 데이터는 영구 동결되어 사후 검증 가능.</li>
    <li><b>추첨 조작</b> → 시드가 투표 데이터 해시로 고정 + 전원 재검증 + 결과 문서 수정 불가.</li>
    <li><b>예약 경합/이중 배정</b> → 슬롯당 고유 문서 1개(원자적 생성)로 이중 예약이 구조적으로 불가능.</li>
    <li><b>추첨 확정 슬롯 침범</b> → 서버 규칙이 추첨 배정된 칸의 예약 생성을 거부.</li>
    <li><b>우선예약 새치기</b> → 우선예약 시간 중 비대상자의 예약을 서버 규칙이 거부.</li>
    <li><b>알려진 한계 (연구실 내부 신뢰 전제)</b>: ① 아직 첫 로그인을 하지 않은 계정은 그 전까지 내부자가 선점할 수 있으므로 명단 등록 후 <b>즉시 첫 로그인(PIN 등록)</b>을 권장. ② 예약 단계 Day 제한 토글은 UI에서만 강제됨(서버 집계 제한).</li>
  </ul>

  <h3>8. 운영 해석 사항 (규칙 원문에 명시되지 않아 확정한 사항)</h3>
  <ul>
    <li>투표(월~수)와 발표(목 12시)는 <b>다음 주 스케줄</b>을 대상으로 함.</li>
    <li>Weekend는 금/토/일 각각을 독립 슬롯으로 취급.</li>
    <li>우선예약 지속 시간: 기본 60분 (관리자 조정 가능).</li>
    <li>우선예약 대상자가 없는 주에는 즉시 전체 오픈.</li>
    <li>미예약 빈 슬롯은 대상 주 중에도 계속 예약 가능 (일요일 24시까지).</li>
  </ul>
  </div>`;
}

/* ---------------- 로그인/부트스트랩 모달 ---------------- */
function openLogin() {
  const actives = Object.values(S.members).filter(m => m.active !== false);
  if (!actives.length) { openBootstrap(); return; }
  const opts = actives.sort((a, b) => a.name.localeCompare(b.name, 'ko'))
    .map(m => `<option value="${m.id}">${esc(m.name)}${m.pinHash ? '' : ' (첫 로그인)'}</option>`).join('');
  showModal(`
    <h2>멤버 로그인</h2>
    <div class="field"><label>이름</label><select id="loginMember">${opts}</select></div>
    <div class="field"><label>PIN (숫자 4자리 이상)</label><input id="loginPin" type="password" inputmode="numeric" placeholder="처음이면 여기서 입력한 PIN이 등록됩니다"></div>
    <div class="flexrow"><button class="btn primary" id="btnDoLogin">로그인</button><button class="btn" data-close>취소</button></div>
    <p class="muted" style="margin-top:10px">⚠ 첫 로그인 시 입력한 PIN이 그대로 등록되니 신중히 입력하세요. PIN 분실 시 관리자에게 초기화를 요청하세요.</p>`);
  $('#btnDoLogin').addEventListener('click', async () => {
    const id = $('#loginMember').value, pin = $('#loginPin').value.trim();
    if (pin.length < 4) return toast('PIN은 4자리 이상이어야 합니다.', 'err');
    try { await store.claim(id, pin); closeModal(); toast(`${memberName(id)}님, 환영합니다!`, 'okk'); }
    catch (e) { toast(e.message, 'err'); }
  });
}
function openBootstrap() {
  showModal(`
    <h2>초기 설정 — 첫 관리자 등록</h2>
    <p class="muted" style="margin-bottom:10px">아직 명단이 비어 있습니다. 이 시스템의 첫 관리자를 등록하세요. 이후 관리자 탭에서 멤버를 추가할 수 있습니다.</p>
    <div class="field"><label>이름</label><input id="bsName" placeholder="예: 홍길동"></div>
    <div class="field"><label>PIN (숫자 4자리 이상)</label><input id="bsPin" type="password" inputmode="numeric"></div>
    <div class="flexrow"><button class="btn primary" id="btnDoBs">관리자로 시작</button><button class="btn" data-close>취소</button></div>`);
  $('#btnDoBs').addEventListener('click', async () => {
    const name = $('#bsName').value.trim(), pin = $('#bsPin').value.trim();
    if (!name) return toast('이름을 입력하세요.', 'err');
    if (pin.length < 4) return toast('PIN은 4자리 이상이어야 합니다.', 'err');
    try { await store.admin.bootstrap(name, pin); closeModal(); toast('관리자 등록 완료!', 'okk'); }
    catch (e) { toast(e.message, 'err'); }
  });
}
function showModal(html) {
  $('#modalRoot').innerHTML = `<div class="modal-bg" id="modalBg"><div class="modal">${html}</div></div>`;
  $('#modalBg').addEventListener('click', e => { if (e.target.id === 'modalBg') closeModal(); });
  document.querySelectorAll('[data-close]').forEach(b => b.addEventListener('click', closeModal));
}
function closeModal() { $('#modalRoot').innerHTML = ''; }

/* ---------------- 메인 이벤트 바인딩 ---------------- */
function bindMain() {
  // 투표 셀 토글
  document.querySelectorAll('[data-act="togglevote"]').forEach(td => td.addEventListener('click', () => {
    const key = td.dataset.cell;
    const p = S.pendingCells || [];
    if (p.includes(key)) S.pendingCells = p.filter(k => k !== key);
    else {
      if (p.length >= TOKENS_PER_WEEK) return toast(`토큰은 주당 ${TOKENS_PER_WEEK}개까지입니다.`, 'err');
      const next = [...p, key];
      const err = validateVoteSet(next);
      if (err) return toast(err, 'err');
      S.pendingCells = next;
    }
    render();
  }));
  $('#btnSaveVotes')?.addEventListener('click', async () => {
    const err = validateVoteSet(S.pendingCells || []);
    if (err) return toast(err, 'err');
    try {
      if ((S.pendingCells || []).length === 0) await store.deleteVotes();
      else await store.saveVotes(S.pendingCells);
      toast('투표가 저장되었습니다.', 'okk');
    } catch (e) { toast('저장 실패: ' + e.message, 'err'); }
  });
  $('#btnResetVotes')?.addEventListener('click', () => { S.pendingCells = [...(S.votes[S.user.id] || [])]; render(); });
  $('#btnClearVotes')?.addEventListener('click', async () => {
    if (!confirm('이번 주 투표를 전부 취소할까요? 토큰이 반환됩니다.')) return;
    try {
      if ((S.votes[S.user.id] || []).length) await store.deleteVotes();
      S.pendingCells = []; render(); toast('투표가 취소되었습니다.', 'okk');
    } catch (e) { toast(e.message, 'err'); }
  });

  // 예약/취소
  document.querySelectorAll('[data-act="book"]').forEach(td => td.addEventListener('click', async () => {
    const key = td.dataset.cell;
    const c = cycle();
    if (inPriorityWindow(c) && !S.results?.priorityMembers?.includes(S.user.id))
      return toast('지금은 Day 탈락자 우선예약 시간입니다. 잠시 후 전체 오픈됩니다.', 'err');
    if (S.config.bookingDayCapEnabled && isDaySlot(parseCell(key).slot)) {
      const lotteryDay = Object.entries(S.results?.assignments || {}).filter(([k, m]) => m === S.user.id && isDaySlot(parseCell(k).slot)).length;
      const bookedDay = Object.entries(S.bookings).filter(([k, b]) => b.memberId === S.user.id && isDaySlot(parseCell(k).slot)).length;
      if (lotteryDay + bookedDay >= DAY_CAP) return toast('Day 시간대는 주당 최대 2배치까지입니다 (연구실 설정).', 'err');
    }
    if (!confirm(`${cellLabel(key)} 슬롯을 예약할까요?`)) return;
    try { await store.book(key); toast('예약 완료!', 'okk'); }
    catch (e) { toast(/permission|exist/i.test(e.message) ? '한발 늦었습니다 — 방금 다른 분이 예약했습니다.' : '예약 실패: ' + e.message, 'err'); }
  }));
  document.querySelectorAll('[data-act="unbook"]').forEach(td => td.addEventListener('click', async () => {
    const key = td.dataset.cell;
    if (!confirm(`${cellLabel(key)} 예약을 취소할까요?`)) return;
    try { await store.unbook(key, cycle().targetWeek); toast('예약이 취소되었습니다.', 'okk'); }
    catch (e) { toast(e.message, 'err'); }
  }));

  // 결과 주차 선택
  $('#selWeek')?.addEventListener('change', e => { S.resultsWeek = parseInt(e.target.value, 10); render(); });

  // 관리자
  $('#btnAddMember')?.addEventListener('click', async () => {
    const name = $('#newMemberName').value.trim();
    if (!name) return toast('이름을 입력하세요.', 'err');
    if (Object.values(S.members).some(m => m.name === name)) return toast('동일한 이름이 이미 있습니다.', 'err');
    try { await store.admin.addMember(name); toast('멤버가 추가되었습니다.', 'okk'); }
    catch (e) { toast(e.message, 'err'); }
  });
  document.querySelectorAll('[data-adm]').forEach(b => b.addEventListener('click', async () => {
    const id = b.dataset.id, act = b.dataset.adm, m = S.members[id];
    const A = store.admin;
    try {
      if (act === 'pin' && confirm(`${m.name}의 PIN을 초기화할까요? 다음 로그인 시 새 PIN을 등록하게 됩니다.`)) await A.resetPin(id);
      if (act === 'dev' && confirm(`${m.name}의 연결 기기를 모두 해제할까요?`)) await A.resetDevices(id);
      if (act === 'adm') await A.setAdmin(id, !m.isAdmin);
      if (act === 'act') await A.setActive(id, m.active === false);
      if (act === 'del' && confirm(`${m.name}을(를) 완전히 삭제할까요? 가급적 '비활성화'를 권장합니다.`)) await A.removeMember(id);
    } catch (e) { toast(e.message, 'err'); }
  }));
  $('#btnSaveCfg')?.addEventListener('click', async () => {
    const v = Math.max(0, Math.min(720, parseInt($('#cfgPrio').value, 10) || 0));
    try {
      await store.admin.saveConfig({ priorityWindowMin: v, bookingDayCapEnabled: $('#cfgDayCap').checked });
      toast('설정이 저장되었습니다.', 'okk');
    } catch (e) { toast(e.message, 'err'); }
  });
  $('#btnDelResults')?.addEventListener('click', async () => {
    if (!confirm('이번 사이클 추첨 결과를 삭제하고 재생성할까요? (결정론적이므로 투표가 같으면 동일한 결과가 나옵니다)')) return;
    try { await store.admin.deleteResults(cycle().targetWeek); S.verify = null; toast('삭제됨 — 잠시 후 자동 재생성됩니다.', 'okk'); }
    catch (e) { toast(e.message, 'err'); }
  });
}

/* ---------------- 카운트다운 틱 ---------------- */
setInterval(() => {
  document.querySelectorAll('.countdown[data-target]').forEach(el => {
    const t = parseInt(el.dataset.target, 10);
    el.textContent = fmtDur(t - now());
    if (t - now() < -2000) render(); // 국면 전환 시 전체 갱신
  });
}, 1000);

/* ---------------- 시작 ---------------- */
store = IS_DEMO ? makeDemoStore() : makeFirestoreStore();
store.start();
render();

</script>
</body>
</html>
