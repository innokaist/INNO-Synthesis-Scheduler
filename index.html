<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNO Scheduler</title>
<style>
  :root { --accent: #3b5bdb; --line: #e3e8f0; --sub: #6b7690; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
         background: #f4f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .wrap { text-align: center; max-width: 560px; width: 100%; }
  h1 { font-size: 26px; letter-spacing: -.5px; margin-bottom: 6px; color: #1c2333; }
  p.sub { color: var(--sub); font-size: 14px; margin-bottom: 28px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
  a.card { display: block; background: #fff; border: 1.5px solid var(--line); border-radius: 16px;
           padding: 30px 18px; text-decoration: none; color: #1c2333; transition: .15s;
           box-shadow: 0 1px 3px rgba(20,30,60,.08), 0 4px 14px rgba(20,30,60,.05); }
  a.card:hover { border-color: var(--accent); transform: translateY(-2px); }
  a.card .emoji { font-size: 34px; display: block; margin-bottom: 10px; }
  a.card b { font-size: 17px; display: block; margin-bottom: 4px; }
  a.card span { font-size: 12.5px; color: var(--sub); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>INNO Scheduler</h1>
    <p class="sub">연구실 주간 스케줄 시스템 — 사용할 스케줄러를 선택하세요</p>
    <div class="cards">
      <a class="card" href="./Synthesis_scheduler.html">
        <span class="emoji">🧪</span><b>Synthesis Scheduler</b>
        <span>합성방 · 토큰 투표 & 실시간 예약</span>
      </a>
      <a class="card" href="./Optics_scheduler.html">
        <span class="emoji">🔬</span><b>Optics Scheduler</b>
        <span>광학방 · 순위 투표 & 자유 조율 & Hardware Log</span>
      </a>
    </div>
  </div>
</body>
</html>
